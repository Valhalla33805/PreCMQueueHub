<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CM QueueHub - Admin Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
    url('background2.jpg') no-repeat center center/cover;
}

.login-box{

    width:90%;
    max-width:400px;

    background:rgba(255,255,255,0.15);

    backdrop-filter:blur(15px);

    padding:40px;

    border-radius:20px;

    text-align:center;

    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h1{
    color:#d4f5d4;
    margin-bottom:10px;
}

p{
    color:#a8e6a3;
    margin-bottom:25px;
}

input{

    width:100%;

    padding:14px;

    margin-bottom:15px;

    border:none;

    border-radius:12px;

    outline:none;

    font-size:15px;
}

button{

    width:100%;

    padding:14px;

    border:none;

    border-radius:12px;

    background:#0f9b0f;

    color:white;

    font-size:16px;

    cursor:pointer;

    transition:0.3s;
}

button:hover{
    background:#0c7a0c;
}

.error{

    margin-top:15px;

    color:#ff6b6b;

    display:none;
}

.back{

    display:inline-block;

    margin-top:20px;

    color:#a8e6a3;

    text-decoration:none;
}

</style>
</head>

<body>

<div class="login-box">

    <h1>🔐 Admin Login</h1>

    <p>CM QueueHub Secure Access</p>

    <input
        type="text"
        id="username"
        placeholder="Enter Username"
    >

    <input
        type="password"
        id="password"
        placeholder="Enter Password"
    >

    <button onclick="login()">
        Login
    </button>

    <div class="error" id="errorMsg">
        Invalid username or password
    </div>

    <a href="registrar-home.html" class="back">
        ← Back to Dashboard
    </a>

</div>

<script>

function login(){

    const username =
        document.getElementById("username").value;

    const password =
        document.getElementById("password").value;

    // DEFAULT ADMIN ACCOUNT
    const adminUser = "admin";
    const adminPass = "12345";

    if(
        username === adminUser &&
        password === adminPass
    ){

        // Save login session
        localStorage.setItem(
            "adminLoggedIn",
            "true"
        );

        // Redirect
        window.location.href = "registrar-admin.html";
    }

    else{

        document.getElementById("errorMsg").style.display =
            "block";
    }
}

</script>

</body>
</html>
