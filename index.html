<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CM QueueHub - Central Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
    font-family: 'Poppins', sans-serif; 
}.school-logo {
    width: 90px;
    height: 90px;
    object-fit: contain;
    margin-bottom: 15px;
    background: rgba(255, 255, 255, 0.15); /* Sleek background */
    border-radius: 50%; /* Perfect circle */
    padding: 10px; /* Optional spacing for logo image */
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
}

body {
    min-height: 100vh; 
    display: flex; 
    justify-content: center; 
    align-items: center;
    background: linear-gradient(rgba(12, 30, 12, 0.65), rgba(12, 30, 12, 0.8)), url('background2.jpg') no-repeat center center/cover;
    overflow-x: hidden;
}

.container {
    width: 90%; 
    max-width: 750px; 
    background: rgba(255, 255, 255, 0.08); 
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 45px 40px; 
    border-radius: 24px; 
    text-align: center; 
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(255, 255, 255, 0.15);
    animation: fadeInUp 0.6s ease-out;
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* 🏫 School Logo Styling */
.school-logo {
    width: 90px;
    height: 90px;
    object-fit: contain;
    margin-bottom: 15px;
    filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
}

h1 { 
    color: #ffffff; 
    margin-bottom: 8px; 
    font-size: 38px; 
    font-weight: 700;
    letter-spacing: -0.5px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.2);
}

h1 span {
    color: #a8e6a3;
}

p { 
    color: #cbd5e1; 
    margin-bottom: 45px; 
    font-size: 16px; 
    font-weight: 300;
}

.portal-grid { 
    display: grid; 
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
    gap: 25px; 
}

.portal-card {
    padding: 35px 25px; 
    border-radius: 18px; 
    background: rgba(255, 255, 255, 0.95); 
    color: #1e293b;
    text-decoration: none; 
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 22px; 
    font-weight: 600; 
    cursor: pointer; 
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
    border: 1px solid transparent;
}

.icon {
    font-size: 40px;
    margin-bottom: 15px;
    transition: transform 0.3s ease;
}

.portal-card span {
    display: block; 
    font-size: 14px; 
    font-weight: 400; 
    color: #64748b; 
    margin-top: 8px;
    line-height: 1.5;
}

/* Custom interactive behavior for each department card */
.finance-card:hover { 
    transform: translateY(-8px); 
    background: #15803d; 
    color: #ffffff; 
    box-shadow: 0 20px 40px rgba(21, 128, 61, 0.3);
    border-color: rgba(255,255,255,0.2);
}

.registrar-card:hover { 
    transform: translateY(-8px); 
    background: #166534; 
    color: #ffffff; 
    box-shadow: 0 20px 40px rgba(22, 101, 52, 0.3);
    border-color: rgba(255,255,255,0.2);
}

.portal-card:hover .icon {
    transform: scale(1.15);
}

.portal-card:hover span { 
    color: #d1fae5; 
}

@media(max-width: 480px) {
    .container { padding: 35px 20px; }
    .school-logo { width: 80px; height: 80px; }
    h1 { font-size: 30px; }
    p { margin-bottom: 30px; }
    .portal-card { padding: 25px 15px; }
}
</style>
</head>
<body>

<div class="container">
    <img src="cmlogo.png" alt="School Logo" class="school-logo" onerror="this.style.display='none'">

    <h1>🏛️ CM <span>QueueHub</span></h1>
    <p>Welcome! Please select a department portal below to begin</p>

    <div class="portal-grid">
        <a href="finance/home.html" class="portal-card finance-card">
            <div class="icon">💰</div>
            Finance Office
            <span>Manage Tuition Fees, Check Accounts & Process Clearances</span>
        </a>

        <a href="registrar/registrar-home.html" class="portal-card registrar-card">
            <div class="icon">🎓</div>
            Registrar Office
            <span>Request TOR, Claim Diplomas & Track Student Records</span>
        </a>
    </div>
</div>

</body>
</html>
